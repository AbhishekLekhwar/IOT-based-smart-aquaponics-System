version: '3.8'

services:
  # 🔵 BLE Bluetooth Service
  ble-scanner:
    build:
      context: ./bluetooth_service
      dockerfile: Dockerfile
    container_name: aquaponics-ble-scanner
    environment:
      - BACKEND_URL=http://aquaponics-backend:5000
      - DEVICE_ID=aquaponics-unit-01
      - BLE_SCAN_INTERVAL=10
      - BLE_DEVICE_TIMEOUT=30
    network_mode: host  # Required for Bluetooth
    devices:
      - /dev/bluetooth:/dev/bluetooth  # Pass Bluetooth device
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

